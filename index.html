<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Swap Shop — Staff Check-in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2D6A4F;
    --green-light: #52B788;
    --green-pale: #D8F3DC;
    --green-dark: #1B4332;
    --orange: #D4572A;
    --orange-light: #F4A261;
    --orange-pale: #FDE8DC;
    --gray-50: #F8F9F7;
    --gray-100: #EEF0EC;
    --gray-200: #D6DAD3;
    --gray-400: #9AA396;
    --gray-600: #5C6360;
    --gray-900: #1A1F1C;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  header {
    width: 100%;
    background: var(--green-dark);
    color: white;
    padding: 20px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  header .label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    color: var(--green-light);
    text-transform: uppercase;
  }

  header h1 { font-size: 22px; font-weight: 600; color: white; line-height: 1.2; }

  .main { width: 100%; max-width: 480px; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

  .mode-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .mode-btn {
    padding: 14px 12px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-200);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    color: var(--gray-600);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .mode-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray-200); transition: background 0.2s; }
  .mode-btn.active-in { background: var(--green-pale); border-color: var(--green-light); color: var(--green-dark); }
  .mode-btn.active-in .dot { background: var(--green); }
  .mode-btn.active-out { background: var(--orange-pale); border-color: var(--orange-light); color: var(--orange); }
  .mode-btn.active-out .dot { background: var(--orange); }

  .scanner-card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    overflow: hidden;
  }

  #reader { width: 100%; display: none; }
  #reader__scan_region img { display: none !important; }

  .scan-prompt {
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }

  .scan-icon-wrap {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: var(--green-pale);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scan-icon-wrap svg { width: 32px; height: 32px; }
  .scan-prompt h2 { font-size: 16px; font-weight: 500; color: var(--gray-900); }
  .scan-prompt p { font-size: 13px; color: var(--gray-400); line-height: 1.5; }

  .scan-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .scan-btn:active { background: var(--green-dark); }

  .stop-btn {
    padding: 12px;
    background: var(--gray-100);
    color: var(--gray-600);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: none;
    width: 100%;
  }

  .manual-section {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    padding: 16px;
  }

  .manual-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--gray-400);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .manual-row { display: flex; gap: 8px; }

  .manual-row input {
    flex: 1;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gray-900);
    background: var(--gray-50);
    outline: none;
    transition: border-color 0.2s;
  }
  .manual-row input:focus { border-color: var(--green-light); }

  .manual-submit {
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--green);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .manual-submit:active { background: var(--green-dark); }

  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--gray-900);
    color: white;
    padding: 12px 20px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--orange); }

  .log-section {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    overflow: hidden;
  }

  .log-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-header span {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--gray-400);
    text-transform: uppercase;
  }

  .log-count {
    background: var(--green-pale);
    color: var(--green-dark);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 500;
  }

  .log-empty { padding: 24px; text-align: center; font-size: 13px; color: var(--gray-400); }

  .log-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    animation: slideIn 0.25s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-item:last-child { border-bottom: none; }
  .log-id { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gray-600); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-time { font-size: 12px; color: var(--gray-400); white-space: nowrap; }
  .log-badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; white-space: nowrap; }
  .log-badge.in { background: var(--green-pale); color: var(--green-dark); }
  .log-badge.out { background: var(--orange-pale); color: var(--orange); }
</style>
</head>
<body>

<header>
  <div class="label">Staff portal</div>
  <h1>Swap Shop TEST</h1>
</header>

<div class="main">

  <div class="mode-toggle">
    <button class="mode-btn active-in" id="btn-in" onclick="setMode('in')">
      <span class="dot"></span> Check in
    </button>
    <button class="mode-btn" id="btn-out" onclick="setMode('out')">
      <span class="dot"></span> Check out
    </button>
  </div>

  <div class="scanner-card">
    <div id="reader"></div>
    <div class="scan-prompt" id="scan-prompt">
      <div class="scan-icon-wrap">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="10" height="10" rx="1.5" stroke="#2D6A4F" stroke-width="2" fill="none"/>
          <rect x="6" y="6" width="4" height="4" fill="#2D6A4F"/>
          <rect x="19" y="3" width="10" height="10" rx="1.5" stroke="#2D6A4F" stroke-width="2" fill="none"/>
          <rect x="22" y="6" width="4" height="4" fill="#2D6A4F"/>
          <rect x="3" y="19" width="10" height="10" rx="1.5" stroke="#2D6A4F" stroke-width="2" fill="none"/>
          <rect x="6" y="22" width="4" height="4" fill="#2D6A4F"/>
          <rect x="19" y="19" width="4" height="4" fill="#2D6A4F"/>
          <rect x="25" y="19" width="4" height="4" fill="#2D6A4F"/>
          <rect x="19" y="25" width="4" height="4" fill="#2D6A4F"/>
          <rect x="25" y="25" width="4" height="4" fill="#2D6A4F"/>
        </svg>
      </div>
      <h2>Scan attendee QR code</h2>
      <p>Tap the button below to open the camera and scan an attendee's QR code.</p>
      <button class="scan-btn" onclick="startScan()">Open camera</button>
    </div>
    <button class="stop-btn" id="stop-btn" onclick="stopScan()">Stop camera</button>
  </div>

  <div class="manual-section">
    <div class="manual-label">Manual entry</div>
    <div class="manual-row">
      <input type="text" id="manual-input" placeholder="Paste QR code ID here..." />
      <button class="manual-submit" onclick="submitManual()">Log</button>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>Recent scans</span>
      <span class="log-count" id="log-count">0</span>
    </div>
    <div id="log-list">
      <div class="log-empty">No scans yet — scans will appear here</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlAfxYRV9EgYFM1bOrYsTP4nvT772eE5sxxWopH0-oXRrfS3-2_pa1QQbgHV9uaW6cmg/exec";
  let mode = 'in';
  let scanner = null;
  let logItems = [];
  let lastScanned = '';
  let lastScannedTime = 0;

  function setMode(m) {
    mode = m;
    document.getElementById('btn-in').className = 'mode-btn' + (m === 'in' ? ' active-in' : '');
    document.getElementById('btn-out').className = 'mode-btn' + (m === 'out' ? ' active-out' : '');
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  async function logScan(id) {
    if (!id || id.trim() === '') return;
    id = id.trim();

    const now = Date.now();
    if (id === lastScanned && now - lastScannedTime < 3000) return;
    lastScanned = id;
    lastScannedTime = now;

    const email = id.split('-')[0] || id;
    showToast('Logging ' + (mode === 'in' ? 'check-in' : 'check-out') + '...', '');

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: id, type: mode === 'in' ? 'Check In' : 'Check Out', email: email })
      });
      showToast(mode === 'in' ? 'Checked in!' : 'Checked out!', 'success');
      addLogItem(id, mode);
    } catch (err) {
      showToast('Error saving — check connection', 'error');
    }
  }

  function addLogItem(id, type) {
    const list = document.getElementById('log-list');
    const empty = list.querySelector('.log-empty');
    if (empty) empty.remove();

    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `
      <span class="log-id">${id}</span>
      <span class="log-time">${time}</span>
      <span class="log-badge ${type}">${type === 'in' ? 'in' : 'out'}</span>
    `;
    list.insertBefore(item, list.firstChild);
    logItems.push({ id, type, time });
    document.getElementById('log-count').textContent = logItems.length;
  }

  function startScan() {
    document.getElementById('scan-prompt').style.display = 'none';
    document.getElementById('reader').style.display = 'block';
    document.getElementById('stop-btn').style.display = 'block';

    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      {
        fps: 20,
        qrbox: { width: 280, height: 280 },
        aspectRatio: 1.0,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true },
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true
      },
      (decodedText) => { logScan(decodedText); },
      () => {}
    ).catch(() => {
      showToast('Camera access denied', 'error');
      stopScan();
    });
  }

  function stopScan() {
    if (scanner) {
      scanner.stop().then(() => { scanner.clear(); scanner = null; }).catch(() => {});
    }
    document.getElementById('reader').style.display = 'none';
    document.getElementById('scan-prompt').style.display = 'flex';
    document.getElementById('stop-btn').style.display = 'none';
  }

  function submitManual() {
    const input = document.getElementById('manual-input');
    const val = input.value.trim();
    if (!val) { showToast('Please enter a QR code ID', 'error'); return; }
    logScan(val);
    input.value = '';
  }

  document.getElementById('manual-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitManual();
  });
</script>
</body>
</html>
